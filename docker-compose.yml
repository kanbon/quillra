# Copy packages/api/.env.example → packages/api/.env and set secrets before `docker compose up`.
# The API creates the SQLite schema automatically on first boot.
# Caddy or another host reverse proxy should forward to http://localhost:3000.

services:
  cms:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - packages/api/.env
    volumes:
      - cms-data:/app/packages/api/data
    restart: unless-stopped

volumes:
  cms-data:
